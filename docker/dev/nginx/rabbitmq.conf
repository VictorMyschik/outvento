server {
    listen 80;
    server_name rabbitmq.travel.allximik.com;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name rabbitmq.travel.allximik.com;

    ssl_certificate     /etc/letsencrypt/live/rabbitmq.travel.allximik.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/rabbitmq.travel.allximik.com/privkey.pem;

    access_log /var/log/nginx/rabbitmq.access.log;
    error_log  /var/log/nginx/rabbitmq.error.log;

    client_max_body_size 0;

    location / {
        # 🔐 Basic Auth (очень рекомендую)
        auth_basic "RabbitMQ Management";
        auth_basic_user_file /etc/nginx/.htpasswd-rabbitmq;

        proxy_pass http://127.0.0.1:15672;
        proxy_http_version 1.1;

        # обязательные заголовки
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        # WebSocket support (RabbitMQ UI без этого ломается)
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
    }
}
