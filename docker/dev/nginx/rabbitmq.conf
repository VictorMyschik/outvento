server {
    listen 80;
    server_name rabbitmq.travel.allximik.com;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name rabbitmq.travel.allximik.com;

    ssl_certificate     /etc/letsencrypt/live/rabbitmq.travel.allximik.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/rabbitmq.travel.allximik.com/privkey.pem;

    client_max_body_size 0;

    location / {
        proxy_pass http://127.0.0.1:15672;

        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        # WebSocket (обязательно для UI)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
