networks:
  frontend:
    external: true
  backend:

services:
  nginx:
    build: ./docker/nginx
    container_name: nginx_travel
    volumes:
      - ./docker/logs/nginx:/var/log/nginx
      - .:/var/www/travel
    environment:
      - VIRTUAL_HOST=travel.test
    ports:
      - "80:80"
    networks:
      frontend:
      backend:
        aliases:
          - travel.test

  php:
    build: ./docker/php
    container_name: php_travel
    networks:
      - backend
    environment:
      - COMPOSER_MEMORY_LIMIT=2G
      - XDEBUG_SESSION="PHPSTORM"
    volumes:
      - .:/var/www/travel
      - ./storage/logs:/var/log/php
      - ./docker/php/php.ini:/usr/local/etc/php/php.ini

  postgres:
    image: postgres:latest
    networks:
      frontend:
      backend:
    ports:
      - '5439:5432'
    environment:
      POSTGRES_DB: travel
      POSTGRES_USER: travel
      POSTGRES_PASSWORD: travel
      PGDATA: "/var/lib/postgresql/data/pgdata"
    volumes:
      - ./docker/postgres/travel:/var/lib/postgresql/data

  redis:
    image: bitnami/redis:latest
    networks:
      - backend
      - frontend
    ports:
      - '6379:6379'
    environment:
      - ALLOW_EMPTY_PASSWORD=yes
